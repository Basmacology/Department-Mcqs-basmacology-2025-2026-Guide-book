                    if (qData.wrong_explanations && Object.keys(qData.wrong_explanations).length > 0) {
                        explanationHTML += `<div class="wrong-title-box">طب ليه الباقي غلط 🤔</div>`;
                        
                        for (const [letter, text] of Object.entries(qData.wrong_explanations)) {
                            // جلب النص الإنجليزي الأصلي من مصفوفة الخيارات
                            const originalOption = qData.options.find(opt => opt.id.toLowerCase() === letter.toLowerCase());
                            const englishText = originalOption ? originalOption.text : '';

                            const formattedText = text.replace(/`([^`]+)`/g, '<span class="term">`$1`</span>');
                            
                            explanationHTML += `
                                <div class="wrong-item">
                                    <div class="wrong-option-container">
                                        <div class="wrong-option-box">
                                            <strong>${letter.toUpperCase()}.</strong> ${englishText}
                                        </div>
                                    </div>
                                    <div class="wrong-text-box">${formattedText}</div>
                                </div>
                            `;
                        }
                    }


                    explanationDiv.innerHTML = explanationHTML;
                    // ==========================================

                    const savedAnswer = localStorage.getItem(`ans_${qData.id}`);

                    qData.options.forEach(opt => {
                        const optionBtn = document.createElement('button');
                        optionBtn.className = 'option';
                        optionBtn.dataset.optId = opt.id.toLowerCase();
                        optionBtn.innerHTML = `<strong>${opt.id.toUpperCase()}.</strong> ${opt.text}`;
                        
                        if (savedAnswer && savedAnswer === opt.id.toLowerCase()) {
                            applySelectionLogic(optionBtn, optionsContainer, explanationDiv, opt.id, qData.correctAnswer);
                        }

                        optionBtn.addEventListener('click', () => {
                            localStorage.setItem(`ans_${qData.id}`, opt.id.toLowerCase());
                            applySelectionLogic(optionBtn, optionsContainer, explanationDiv, opt.id, qData.correctAnswer);
                        });

                        optionsContainer.appendChild(optionBtn);
                    });

                    card.appendChild(optionsContainer);
                    card.appendChild(explanationDiv);
                    quizContainer.appendChild(card);
                });

                

                if (chapter.id !== chaptersData[chaptersData.length - 1].id) {
                    const divider = document.createElement('hr');
                    divider.className = 'chapter-divider';
                    quizContainer.appendChild(divider);
                }
            });
        }

        function applySelectionLogic(clickedBtn, optionsContainer, explanationDiv, selectedId, correctId) {
            Array.from(optionsContainer.children).forEach(btn => {
                btn.className = 'option';
            });

            const isCorrect = selectedId.toLowerCase() === correctId.toLowerCase();

            if (isCorrect) {
                clickedBtn.classList.add('selected', 'correct');
            } else {
                clickedBtn.classList.add('selected', 'incorrect');
                const correctBtn = Array.from(optionsContainer.children).find(b => b.dataset.optId === correctId.toLowerCase());
                if(correctBtn) correctBtn.classList.add('reveal-correct');
            }
            
            if(explanationDiv.innerHTML !== '') {
                explanationDiv.style.display = 'block';
            }
        }

        function toggleAllAnswers() {
            const btn = document.getElementById('toggle-all-btn');
            allRevealed = !allRevealed;

            chaptersData.forEach(chapter => {
                chapter.questions.forEach(qData => {
                    const card = document.querySelector(`.question-card[data-id="${qData.id}"]`);
                    if(!card) return;
                    
                    const optionsContainer = card.querySelector('.options');
                    const explanationDiv = card.querySelector('.explanation');

                    Array.from(optionsContainer.children).forEach(b => b.className = 'option');
                    explanationDiv.style.display = 'none';

                    if (allRevealed) {
                        const correctBtn = Array.from(optionsContainer.children).find(b => b.dataset.optId === qData.correctAnswer.toLowerCase());
                        if (correctBtn) correctBtn.classList.add('selected', 'correct');
                        if(explanationDiv.innerHTML !== '') explanationDiv.style.display = 'block';
                    } else {
                        const savedAnswer = localStorage.getItem(`ans_${qData.id}`);
                        if(savedAnswer) {
                            const savedBtn = Array.from(optionsContainer.children).find(b => b.dataset.optId === savedAnswer);
                            if(savedBtn) applySelectionLogic(savedBtn, optionsContainer, explanationDiv, savedAnswer, qData.correctAnswer);
                        }
                    }
                });
            });

            btn.innerText = allRevealed ? "❌ Deactivate Basmacology Mode ❌" : "🫆 Activate Basmacology Mode 🫆";

        }

        // دالة مخصصة لمسح تقدم فصل معين بصرياً ومن الذاكرة بدون إعادة تحميل كامل الصفحة
        function clearChapterProgress(chapterId) {
            const chapter = chaptersData.find(c => c.id === chapterId);
            if (!chapter || chapter.questions.length === 0) return;

            chapter.questions.forEach(qData => {
                localStorage.removeItem(`ans_${qData.id}`);
                
                const card = document.querySelector(`.question-card[data-id="${qData.id}"]`);
                if(card) {
                    const optionsContainer = card.querySelector('.options');
                    const explanationDiv = card.querySelector('.explanation');
                    
                    Array.from(optionsContainer.children).forEach(btn => {
                        btn.className = 'option';
                    });
                    explanationDiv.style.display = 'none';
                }
            });
        }

        renderQuiz();
        function goToQuestion(id) {
            const targetQuestion = document.querySelector(`.question-card[data-id="${id}"]`);
            if (targetQuestion) {
                targetQuestion.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                targetQuestion.style.transition = "box-shadow 0.5s";
                targetQuestion.style.boxShadow = "0 0 20px rgba(184, 172, 153, 0.8)";
                
                setTimeout(() => {
                    targetQuestion.style.boxShadow = "0 4px 10px rgba(0,0,0,0.05)";
                }, 2000);
            }
        }
    window.addEventListener('online', function() {

    window.location.href = window.location.pathname + '?v=' + new Date().getTime();
});
let revisionMode = false;
function toggleRevisionMode() {
    revisionMode = !revisionMode;
    const btn = document.getElementById('toggle-revision-btn');
    
    if (revisionMode) {
        document.body.classList.add('revision-mode-active');
        btn.innerText = "❌ Deactivate Revision Mode ❌";
    } else {
        document.body.classList.remove('revision-mode-active');
        btn.innerText = "📝 Activate Revision Mode 📝";
    }
}
